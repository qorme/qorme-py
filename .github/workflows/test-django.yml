name: qorme-django tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'integrations/qorme-django/**'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/test-django.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'integrations/qorme-django/**'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/test-django.yml'
  workflow_dispatch:

jobs:
  test:
    name: Django ${{ matrix.django-version }} | Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.2", "6.0"]
        exclude:
          - django-version: "6.0"
            python-version: "3.10"
          - django-version: "6.0"
            python-version: "3.11"

    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Build Cython
        run: make build-cython

      - name: Run Django Tests
        run: make -C integrations/qorme-django test DJANGO_VERSION="${{ matrix.django-version }}"
